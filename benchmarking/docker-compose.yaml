services:
  dbfs:
    build:
      context: ..
      dockerfile: benchmarking/dbfs-server.Dockerfile
    cap_add:
      - SYS_ADMIN
    environment:
      DBFS_PORT: 25432
    ports:
      - 25432:25432
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test:
        - CMD-SHELL
        - nc -z localhost 25432
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - ./results:/artifacts

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:latest}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - pg_stat_statements.max=10000
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-benchbase}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-benchbase}
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - ${POSTGRES_PORT:-5432}:5432

  benchbase:
    image: benchbase.azurecr.io/benchbase
    platform: linux/amd64
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BENCHBASE_PROFILE: ${BENCHBASE_PROFILE:-postgres}
    entrypoint:
      - /bin/sh
      - -lc
      - |
        cd /benchbase/profiles/$${BENCHBASE_PROFILE:-postgres}
        exec java -cp "benchbase.jar:/benchbase/user-jars/*:/benchbase/user-jars/dependency/*" com.oltpbenchmark.DBWorkload "$@"
      - --
    volumes:
      - ./results:/benchbase/results
      - ./benchbase-config:/benchbase/benchbase-config:ro
      - ../dbfs-jdbc/target:/benchbase/user-jars:ro

  flamegraph:
    build:
      context: ..
      dockerfile: benchmarking/flamegraph.Dockerfile
    volumes:
      - ./results:/artifacts