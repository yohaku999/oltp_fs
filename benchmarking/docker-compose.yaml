services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:latest}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-benchbase}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-benchbase}
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - ${POSTGRES_PORT:-5432}:5432

  benchbase:
    image: benchbase.azurecr.io/benchbase
    platform: linux/amd64
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BENCHBASE_PROFILE: ${BENCHBASE_PROFILE}
    entrypoint:
      - /bin/sh
      - -lc
      - |
        cd /benchbase/profiles/$${BENCHBASE_PROFILE}
        exec java -cp "benchbase.jar:/benchbase/user-jars/*" com.oltpbenchmark.DBWorkload "$@"
      - --
    volumes:
      - ./results:/benchbase/results
      - ./benchbase-config:/benchbase/benchbase-config:ro
      - ../dbfs-jdbc/target:/benchbase/user-jars:ro